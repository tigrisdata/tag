# CLA Assistant — first-time contributors must sign docs/CLA.md before a PR is
# merged. This only publishes a status; enforcement requires adding it as a
# required check in main's branch protection.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  # read suffices: signatures are written to the remote signatures repo via the
  # scoped token below, not to this repo.
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # issue_comment also fires for plain issues; only run it for PR comments.
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (github.event.comment.body == 'recheck' ||
        github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - name: CLA Assistant
        # Org fork of the archived contributor-assistant/github-action, pinned to
        # an immutable commit SHA.
        uses: tigrisdata/cla-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scoped to only tigrisdata/cla-signatures (least privilege).
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_BOT_CLA_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/tigrisdata/tag/blob/main/docs/CLA.md'
          remote-organization-name: tigrisdata
          remote-repository-name: cla-signatures
          branch: 'main'
          # Exact logins only — a "*[bot]" wildcard becomes a regex where [bot] is
          # a character class, which does not match bot accounts.
          allowlist: 'dependabot[bot],github-actions[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge this, please sign our [Contributor License Agreement](https://github.com/tigrisdata/tag/blob/main/docs/CLA.md) by posting the comment below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
