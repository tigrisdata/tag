# CLA Assistant — requires first-time contributors to sign the Contributor
# License Agreement (docs/CLA.md) before their pull request can be merged.
#
# SETUP REQUIRED before this is functional:
#   1. Create a Personal Access Token (or GitHub App token) with write access to
#      the repository chosen to store signatures, and add it as the repo secret
#      CLA_SIGNATURES_TOKEN. The default GITHUB_TOKEN cannot push to a separate
#      signatures repo.
#   2. Decide where signatures are stored: either in this repo (default below) or
#      a dedicated private repo via remote-organization-name/remote-repository-name.
#   3. Confirm the CLA text in docs/CLA.md is finalized by legal, then remove the
#      DRAFT banner in that file.
#
# Contributors sign by commenting the exact phrase configured in
# `custom-pr-sign-comment` on their PR.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required to persist signatures. See SETUP above.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/tigrisdata/tag/blob/main/docs/CLA.md'
          branch: 'main'
          # Bots never sign; exempt them.
          allowlist: 'dependabot[bot],*[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge this, please sign our [Contributor License Agreement](https://github.com/tigrisdata/tag/blob/main/docs/CLA.md) by posting the comment below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          # To store signatures in a dedicated repo instead of this one, set:
          # remote-organization-name: tigrisdata
          # remote-repository-name: cla-signatures
