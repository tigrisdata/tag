# CLA Assistant — requires first-time contributors to sign the Contributor
# License Agreement (docs/CLA.md) before their pull request can be merged.
#
# Signatures are stored in the private repo tigrisdata/cla-signatures, written by
# the tigrisdata-argocd-bot account via the GH_BOT_ACCESS_TOKEN org secret. This
# keeps signature commits (and contributor PII) out of this repo, and lets one
# store serve multiple Tigris projects.
#
# REMAINING SETUP before this is fully enforced:
#   1. Enforcement. This action publishes a "CLA Assistant" commit status on the
#      PR but does not block merges by itself. Add that status as a REQUIRED
#      status check in the branch protection rule for `main` so an unsigned CLA
#      actually blocks the merge button.
#
# Contributors sign by commenting the exact phrase in `custom-pr-sign-comment`.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  # read is sufficient: signatures are written to the remote signatures repo via
  # PERSONAL_ACCESS_TOKEN, not to this repo.
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # Run on PR events, and on issue comments ONLY when the comment is on a pull
    # request (issue_comment fires for plain issues too, which have no PR context).
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (github.event.comment.body == 'recheck' ||
        github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - name: CLA Assistant
        # tigrisdata/cla-action is our fork of the archived
        # contributor-assistant/github-action (Apache-2.0), pinned to the v2.6.1
        # commit SHA. We own the fork so we can apply security fixes and bump the
        # action runtime (it targets node20, which GitHub is deprecating) when
        # needed — upstream is archived and will not. Update the pinned SHA here
        # after changes land in the fork.
        uses: tigrisdata/cla-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tigrisdata-argocd-bot token with write access to tigrisdata/cla-signatures.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_BOT_ACCESS_TOKEN }}
        with:
          # Path within the signatures repo (on the branch below).
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/tigrisdata/tag/blob/main/docs/CLA.md'
          # Store signatures in the dedicated private repo, not this one.
          remote-organization-name: tigrisdata
          remote-repository-name: cla-signatures
          branch: 'main'
          # Bots never sign. List each by its exact login — wildcards like
          # "*[bot]" are interpreted as a regex where [bot] is a character class
          # (matching any name ending in b, o, or t), which is incorrect.
          allowlist: 'dependabot[bot],github-actions[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge this, please sign our [Contributor License Agreement](https://github.com/tigrisdata/tag/blob/main/docs/CLA.md) by posting the comment below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
