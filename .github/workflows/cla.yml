# CLA Assistant — requires first-time contributors to sign the Contributor
# License Agreement (docs/CLA.md) before their pull request can be merged.
#
# SETUP REQUIRED before this is functional:
#   1. Finalize docs/CLA.md with legal and remove its DRAFT banner.
#   2. Signature storage. By default signatures are committed to THIS repo on the
#      `main` branch (needs `contents: write`, provided below, via GITHUB_TOKEN).
#      To keep `main` clean, store them in a dedicated repo instead: set
#      remote-organization-name / remote-repository-name below, change
#      `contents:` back to `read`, and provide a PAT with write access to that
#      repo as the CLA_SIGNATURES_TOKEN secret (uncomment PERSONAL_ACCESS_TOKEN).
#   3. Enforcement. This action publishes a "CLA Assistant" commit status on the
#      PR but does not block merges by itself. Add that status as a REQUIRED
#      status check in the branch protection rule for `main` so an unsigned CLA
#      actually blocks the merge button.
#
# Contributors sign by commenting the exact phrase in `custom-pr-sign-comment`.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  # write is required to commit signatures to this repo (default storage).
  # Switch to `read` only if signatures are stored in a separate remote repo.
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    # Run on PR events, and on issue comments ONLY when the comment is on a pull
    # request (issue_comment fires for plain issues too, which have no PR context).
    if: >-
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (github.event.comment.body == 'recheck' ||
        github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'))
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Only needed when storing signatures in a separate remote repo:
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/tigrisdata/tag/blob/main/docs/CLA.md'
          branch: 'main'
          # Bots never sign. List each by its exact login — wildcards like
          # "*[bot]" are interpreted as a regex where [bot] is a character class
          # (matching any name ending in b, o, or t), which is incorrect.
          allowlist: 'dependabot[bot],github-actions[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution! Before we can merge this, please sign our [Contributor License Agreement](https://github.com/tigrisdata/tag/blob/main/docs/CLA.md) by posting the comment below.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
          # To store signatures in a dedicated repo instead of this one, set:
          # remote-organization-name: tigrisdata
          # remote-repository-name: cla-signatures
