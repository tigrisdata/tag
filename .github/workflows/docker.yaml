name: Docker Build and Push

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [release]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v1.0.0)"
        required: true

env:
  GOPRIVATE: github.com/tigrisdata

jobs:
  build-and-push:
    runs-on: namespace-profile-ubuntu-2404
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_BOT_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            git fetch --tags
            VERSION=$(git tag --list 'v*' --sort=-version:refname | head -1)
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: No version found"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout release tag
        run: git checkout ${{ steps.version.outputs.version }}

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_ACCESS_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p deploy/docker/bin/amd64 deploy/docker/bin/arm64

          gh release download "$VERSION" -p "tag-linux-amd64" -O deploy/docker/bin/amd64/tag
          gh release download "$VERSION" -p "tag-linux-arm64" -O deploy/docker/bin/arm64/tag

          chmod +x deploy/docker/bin/*/tag

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.GH_DOCKER_ACCESS_USER }}
          password: ${{ secrets.GH_DOCKER_ACCESS_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAGS="tigrisdata/tag:${VERSION}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAGS="${TAGS},tigrisdata/tag:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: deploy/docker
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
