# Docker Compose for S3 Compatibility Tests
# This file sets up infrastructure for running Ceph s3-tests against TAG in Docker.
#
# TAG uses embedded OCache - no separate cache server needed.
#
# RECOMMENDED: Use `make s3-test-local` instead (no Docker needed):
#   export AWS_ACCESS_KEY_ID=<your-key>
#   export AWS_SECRET_ACCESS_KEY=<your-secret>
#   make s3-test-local      # Starts TAG on host with embedded cache
#   make s3-tests           # Run tests
#   make s3-test-local-down # Cleanup

services:
  tag:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      secrets:
        - git_auth_token
    image: tigrisdata/tag:s3-test
    container_name: tag-s3test
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - TAG_UPSTREAM_ENDPOINT=${TAG_UPSTREAM_ENDPOINT:-https://t3.storage.dev}
      - TAG_CACHE_NODE_ID=tag-s3test
      - TAG_CACHE_DISK_PATH=/data/cache
      - TAG_LOG_LEVEL=${TAG_LOG_LEVEL:-debug}
      - TAG_PPROF_ENABLED=true
    volumes:
      - tag-s3test-cache:/data/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - s3test-network
    profiles:
      - full

networks:
  s3test-network:
    driver: bridge

volumes:
  tag-s3test-cache:

secrets:
  git_auth_token:
    environment: GH_TOKEN
