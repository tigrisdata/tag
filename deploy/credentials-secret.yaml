apiVersion: v1
kind: Secret
metadata:
  name: tag-credentials
  labels:
    app: tag
type: Opaque
stringData:
  credentials.json: |
    {
      "credentials": [
        {
          "access_key": "tid_YOUR_ACCESS_KEY_HERE",
          "secret_key": "tsec_YOUR_SECRET_KEY_HERE"
        }
      ]
    }
---
