# Docker Compose for TAG (Tigris Acceleration Gateway)
#
# TAG uses embedded OCache - no separate cache server needed.
#
# Usage:
#   export AWS_ACCESS_KEY_ID=<your-key>
#   export AWS_SECRET_ACCESS_KEY=<your-secret>
#   docker compose up -d

services:
  tag:
    build:
      context: .
      dockerfile: Dockerfile
    image: tigrisdata/tag:latest
    container_name: tag
    ports:
      - "8080:8080"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - TAG_UPSTREAM_ENDPOINT=${TAG_UPSTREAM_ENDPOINT:-https://t3.storage.dev}
      - TAG_CACHE_NODE_ID=tag-standalone
      - TAG_CACHE_DISK_PATH=/data/cache
      - TAG_LOG_LEVEL=${TAG_LOG_LEVEL:-info}
    volumes:
      - tag-cache:/data/cache
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - tag-network

networks:
  tag-network:

volumes:
  tag-cache:
